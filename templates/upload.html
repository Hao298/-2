{% extends "base.html" %}

{% block title %}上传头像{% endblock %}

{% block content %}
<div class="card">
    <h1>上传头像</h1>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-msg">上传成功！</div>
        <div style="text-align:center; margin:20px 0;">
            <img src="{{ file_url }}" alt="头像预览" style="max-width:200px; max-height:200px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.15);">
        </div>
        <div style="text-align:center; margin-bottom:16px;">
            <p style="font-size:13px; color:#666;">文件名：{{ filename }}</p>
            <a href="{{ file_url }}" target="_blank" style="color:#667eea; font-size:13px;">打开文件链接</a>
        </div>
        <div class="footer-link">
            <a href="/upload">继续上传</a> &nbsp;|&nbsp; <a href="/">返回首页</a>
        </div>
    {% else %}
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">选择文件</label>
            <input type="file" id="file" name="file" required
                   style="width:100%; padding:10px 12px; border:1px solid #d9d9d9; border-radius:6px; font-size:14px; background:#fff;">
        </div>
        <button type="submit">上 传</button>
    </form>

    <div class="footer-link">
        <a href="/">← 返回首页</a>
    </div>
    {% endif %}
</div>
{% endblock %}
