<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="brand">用户管理系统</a>
            <div class="nav-right">
                {% if username %}
                    <span class="nav-greeting">欢迎，{{ username }}</span>
                    <a href="/upload" class="nav-link nav-link-upload">上传头像</a>
                    <a href="/logout" class="nav-link nav-link-logout">退出</a>
                {% else %}
                    <a href="/login" class="nav-link nav-link-login">登录</a>
                    <a href="/register" class="nav-link nav-link-register">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
