{% extends "base.html" %}

{% block title %}用户登录{% endblock %}

{% block content %}
<div class="card">
    <h1>用户登录</h1>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if request.args.get('msg') %}
        <div class="success-msg">{{ request.args.get('msg') }}</div>
    {% endif %}

    <form method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="text" id="captcha" name="captcha" placeholder="输入验证码" required
                       style="flex:1; padding:10px 12px; border:1px solid #d9d9d9; border-radius:6px; font-size:14px;">
                <img src="/captcha" onclick="this.src='/captcha?'+Date.now()" style="cursor:pointer; border-radius:4px; height:40px;" title="点击刷新验证码">
            </div>
            <div style="font-size:12px; color:#999; margin-top:4px;">点击图片刷新验证码</div>
        </div>
        <button type="submit">登 录</button>
    </form>

    <div class="footer-link">
        <a href="/forget_pwd">忘记密码？</a> &nbsp;|&nbsp; <a href="/">返回首页</a>
    </div>
</div>
{% endblock %}
